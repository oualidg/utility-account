# ==============================================================================
# Docker Compose — Utility Account Production Stack
#
# Services:
#   - springboot: Spring Boot backend API (internal only, port 8080)
#   - nginx:      Nginx reverse proxy + Angular static files (public, port 80)
#
# PostgreSQL is intentionally excluded — it runs as a standalone container
# with --restart always and a named volume (postgres-data), started once and
# never touched by deployments. This prevents data loss during redeployments.
#
# Network:
#   All services share the utility-network bridge network.
#   Spring Boot is reachable from Nginx via hostname "springboot".
#   Neither Spring Boot nor PostgreSQL are exposed publicly.
#
# Secrets:
#   Loaded from .env file in the same directory as this file.
#   The .env file is never committed to Git.
#
# Logs:
#   Both services write logs to bind-mounted host directories.
#   Host path: /opt/utility-account/logs/
#   Spring Boot: /opt/utility-account/logs/springboot/
#   Nginx:       /opt/utility-account/logs/nginx/
#   Logs persist across container restarts and rebuilds.
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # Spring Boot Backend
  #
  # - Connects to PostgreSQL running outside this compose stack
  # - Only reachable from Nginx via internal Docker network
  # - Port 8080 is NOT exposed to the host — Nginx proxies to it internally
  # ----------------------------------------------------------------------------
  springboot:
    image: ghcr.io/oualidg/utility-account:latest
    container_name: springboot
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://172.17.0.1:5432/postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_JWT_COOKIE_SECURE: "false"
    volumes:
      # Mount Spring Boot logs to host so they persist across container
      # restarts and are readable directly on the server without docker exec.
      # Host path: /opt/utility-account/logs/springboot/
      - ./logs/springboot:/app/logs
    networks:
      - utility-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------------------------------------------
  # Nginx — Static File Server + Reverse Proxy
  #
  # - Serves Angular static files from /usr/share/nginx/html
  # - Proxies /api/* to Spring Boot via internal network
  # - Only service exposed to the host on port 80
  # - nginx.conf is bind-mounted from the server so it can be updated
  #   without rebuilding the image
  # ----------------------------------------------------------------------------
  nginx:
    image: ghcr.io/oualidg/utility-account-ui:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount Nginx logs to host for direct access on the server.
      # access.log — every request with correlation ID, status, duration
      # error.log  — Nginx errors and warnings
      # Host path: /opt/utility-account/logs/nginx/
      - ./logs/nginx:/var/log/nginx
    networks:
      - utility-network
    depends_on:
      springboot:
        condition: service_healthy

# ------------------------------------------------------------------------------
# Network
# Bridge network shared by all services in this stack.
# Docker's internal DNS resolves service names to container IPs automatically.
# e.g. "springboot" resolves to the Spring Boot container's internal IP.
# ------------------------------------------------------------------------------
networks:
  utility-network:
    driver: bridge
