# ==============================================================================
# Nginx Configuration — Production Grade API Gateway
#
# Responsibilities:
#   1. Serve Angular static files (HTML, CSS, JS) on port 80
#   2. Proxy /api/* requests to Spring Boot on port 8080
#   3. Handle Angular client-side routing (HTML5 pushState)
#   4. Rate limiting — protect against abuse and brute force
#   5. Security headers — harden HTTP responses
#   6. Request size limiting — reject oversized payloads early
#   7. Correlation ID stamping — trace requests across the system
#   8. Timeout configuration — prevent slow upstream connections
#   9. Gzip compression — reduce bandwidth and improve load times
#  10. Static asset caching — leverage Angular content hashes
#
# Architecture:
#   Browser → Nginx (port 80)
#               ├── /api/*  → Spring Boot (port 8080, internal only)
#               └── /*      → Angular static files
# ==============================================================================

# ------------------------------------------------------------------------------
# Rate Limiting Zones
# Defined at http level so they are shared across all server blocks.
#
# $binary_remote_addr uses binary IP format (4 bytes vs ~15 bytes for string)
# saving memory in the shared zone.
#
# api_limit:    10 requests/second per IP for API endpoints.
#               Protects Spring Boot from abuse and brute-force login attempts.
#
# static_limit: 30 requests/second per IP for static files.
#               More generous — browsers fetch many assets in parallel on load.
# ------------------------------------------------------------------------------

events {
    # Maximum simultaneous connections per worker process.
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

    # --------------------------------------------------------------------------
    # Hide Nginx version from error pages and Server response header.
    # Prevents attackers from knowing which Nginx version to target.
    # --------------------------------------------------------------------------
    server_tokens off;

    # Include MIME type mappings so browsers receive correct Content-Type headers.
    # Without this, .js files are served as text/plain and Angular won't load.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file serving — sends files directly from kernel space.
    sendfile on;

    # Keep connections open to reduce TCP handshake overhead.
    keepalive_timeout 65;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # Compresses responses before sending to reduce bandwidth.
    # Angular bundles can go from ~500KB to ~150KB compressed.
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_min_length 1024;

    # --------------------------------------------------------------------------
    # Request Size Limit
    # Rejects request bodies larger than 10MB before they reach Spring Boot.
    # Protects against payload-based DoS attacks.
    # --------------------------------------------------------------------------
    client_max_body_size 10M;

    # --------------------------------------------------------------------------
    # Proxy Timeout Settings
    # How long Nginx waits for Spring Boot to respond before returning 504.
    # Prevents slow upstream connections from holding Nginx workers indefinitely.
    # --------------------------------------------------------------------------
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # --------------------------------------------------------------------------
    # Log Format
    # Custom format including correlation ID for end-to-end request tracing.
    # The $request_id captures the ID stamped on every request.
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'corr="$request_id" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Root directory where Angular static files are served from.
        root /usr/share/nginx/html;
        index index.html;

        # --------------------------------------------------------------------------
        # Security Headers
        # Applied to all responses — both API and static files.
        #
        # X-Frame-Options:      Prevents clickjacking by blocking iframe embedding.
        # X-Content-Type-Options: Prevents MIME sniffing attacks.
        # X-XSS-Protection:    Enables browser XSS filter (legacy browsers).
        # Referrer-Policy:     Controls how much referrer info is sent with requests.
        # Permissions-Policy:  Disables browser features not needed by the app.
        # --------------------------------------------------------------------------
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # --------------------------------------------------------------------------
        # API Reverse Proxy
        # Forwards /api/* to Spring Boot. Spring Boot is not exposed publicly —
        # only Nginx can reach it via Docker's internal network.
        # --------------------------------------------------------------------------
        location /api/ {

            # Rate limiting: allow bursts of up to 20 requests, then enforce 10r/s.
            # nodelay: serve burst requests immediately rather than queuing them.
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://springboot:8080/api/;

            # Stamp correlation ID from Nginx's unique $request_id.
            # CorrelationIdFilter in Spring Boot picks this up from the header
            # and uses it instead of generating a new UUID.
            proxy_set_header X-Correlation-ID  $request_id;

            # Forward real client information to Spring Boot.
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host              $host;

            # Use HTTP/1.1 for keep-alive connections to Spring Boot.
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # --------------------------------------------------------------------------
        # No caching for index.html
        # Ensures users always get the latest Angular bundle after deployments.
        # All other static assets (JS/CSS) are cached aggressively via content hashes.
        # --------------------------------------------------------------------------
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # --------------------------------------------------------------------------
        # Angular Static Files + HTML5 PushState Routing
        # try_files checks for a real file first, then falls back to index.html.
        # Without this, refreshing on /customers returns 404 from Nginx.
        # --------------------------------------------------------------------------
        location / {
            limit_req zone=static_limit burst=50 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # --------------------------------------------------------------------------
        # Aggressive Caching for Static Assets
        # Angular appends content hashes to filenames (e.g. main.abc123.js).
        # New deployments produce new filenames so long cache TTLs are safe —
        # browsers automatically fetch the new file on next deployment.
        # --------------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            limit_req zone=static_limit burst=50 nodelay;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # --------------------------------------------------------------------------
        # Block common attack paths.
        # Return 404 for hidden files (e.g. .git, .env, .htaccess).
        # Prevents accidental exposure of sensitive files.
        # --------------------------------------------------------------------------
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
