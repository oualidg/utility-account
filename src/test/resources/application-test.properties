# ==============================================================================
# Test Profile Configuration
# ==============================================================================
# Activated during tests with @ActiveProfiles("test")
# Inherits from application.properties and overrides only what's different

# ==============================================================================
# Test Database (Testcontainers)
# ==============================================================================
# JDBC URL and credentials are automatically injected by Testcontainers
# No manual spring.datasource settings are required here
spring.liquibase.default-schema=public
spring.jpa.properties.hibernate.default_schema=public
spring.liquibase.contexts=test

# ==============================================================================
# JPA & Hibernate Test Settings
# ==============================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.datasource.hikari.connection-init-sql=

# ==============================================================================
# Test Environment UI & Lifecycle
# ==============================================================================
spring.main.banner-mode=off

# ==============================================================================
# Logging Configuration (Minimal for Performance)
# ==============================================================================
logging.level.root=WARN
logging.level.com.mycompany.api.account=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.liquibase=WARN

# ==============================================================================
# CORS Configuration
# ==============================================================================
app.cors.allowed-origins=http://your-test-domain.com

# ==============================================================================
# JWT Configuration (Test)
# ==============================================================================
app.jwt.secret=3d2f8a1c9e4b7f0a6d5e2c8b1a4f9e3d2f8a1c9e4b7f0a6d5e2c8b1a4f9e3dab
app.jwt.access-token-expiry=900
app.jwt.refresh-token-expiry=86400
app.jwt.cookie-secure=false