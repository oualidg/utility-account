databaseChangeLog:
  - changeSet:
      id: 005-create-users-table
      author: oualid.gharach
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: first_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: last_login_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 005-seed-dev-admin-user
      author: oualid.gharach
      context: dev,test,prod
      comment: >
        Seed admin user for local development.
        username: admin / password: admin (BCrypt rounds=12)
      changes:
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "admin" }
              - column: { name: first_name, value: "Admin" }
              - column: { name: last_name, value: "User" }
              - column: { name: email, value: "admin@utility.local" }
              - column: { name: password_hash, value: "$2a$12$EcG9/nqKUP6L9qCH.i8HCu41MMQVCa9zPP0g0EjoIjOXXG0ShnIQe" }
              - column: { name: role, value: "ROLE_ADMIN" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: created_at, valueComputed: "NOW()" }
              - column: { name: updated_at, valueComputed: "NOW()" }